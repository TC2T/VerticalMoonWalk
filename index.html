<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>VerticalMoonWalk</title>
    <link rel="stylesheet" href="styles.css?v=20260707b" />
  </head>
  <body>
    <!-- tutorial banner removed per user request -->
    <video id="gameBackground" autoplay muted loop playsinline preload="auto">
      <source src="./Custom/Visuels/Fond.mp4" type="video/mp4" />
    </video>
    <div class="game-shell">
      <canvas id="game" width="480" height="720"></canvas>

      <div class="in-game-buttons" aria-hidden="false">
          <button id="restartButton" class="circle-btn restart" title="Recommencer" aria-label="Recommencer">
            <img src="./Custom/Visuels/Button-Restart.png" alt="Recommencer" />
          </button>

          <button id="pauseButton" class="circle-btn pause" type="button" title="Pause" aria-label="Pause">
            <img src="./Custom/Visuels/Button-Pause.png" alt="Pause" />
          </button>

          <button id="soundButton" class="circle-btn sound" type="button" title="Son" aria-label="Son">
            <img src="./Custom/Visuels/button-sound.png" alt="Son" />
          </button>
      </div>

      <div id="pauseQuickAudio" class="pause-quick-audio" hidden>
        <label for="pauseAmbianceSelect">Fais-nous danser sur</label>
        <select id="pauseAmbianceSelect">
          <option value="thriller">Thriller</option>
          <option value="beat_it">Beat It</option>
          <option value="smooth_criminal">Smooth Criminal</option>
          <option value="remember_the_time">Remember The Time</option>
          <option value="you_rock_my_world">You Rock My World</option>
        </select>
      </div>

      <div id="soundSettingsPanel" class="sound-settings-panel" hidden>
        <div class="sound-settings-card" role="dialog" aria-modal="true" aria-labelledby="sound-settings-title">
          <div class="sound-settings-header">
            <h2 id="sound-settings-title">Paramètres audio</h2>
            <button id="closeSoundSettings" class="icon-btn" type="button" aria-label="Fermer">×</button>
          </div>

          <label class="setting-row" for="effectsToggle">
            <span>Effets</span>
            <input id="effectsToggle" type="checkbox" checked />
          </label>

          <label class="setting-row" for="musicToggle">
            <span>Musique</span>
            <input id="musicToggle" type="checkbox" checked />
          </label>

          <label class="setting-row" for="ambianceSelect">
            <span>Ambiance</span>
            <select id="ambianceSelect">
              <option value="thriller">Thriller</option>
              <option value="beat_it">Beat It</option>
              <option value="smooth_criminal">Smooth Criminal</option>
              <option value="remember_the_time">Remember The Time</option>
              <option value="you_rock_my_world">You Rock My World</option>
            </select>
          </label>
        </div>
      </div>

      <div id="swipeArea" class="swipe-area" aria-hidden="false"></div>
    </div>
    <script src="game.js?v=20260707b"></script>
  </body>
</html>

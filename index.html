<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>VerticalMoonWalk</title>
    <link rel="stylesheet" href="styles.css?v=20260706" />
  </head>
  <body>
    <!-- tutorial banner removed per user request -->
    <video id="gameBackground" autoplay muted loop playsinline preload="auto">
      <source src="./Custom/Visuels/Fond.mp4" type="video/mp4" />
    </video>
    <div class="game-shell">
      <canvas id="game" width="480" height="720"></canvas>

      <div class="in-game-buttons" aria-hidden="false">
          <button id="restartButton" class="circle-btn restart" title="Recommencer" aria-label="Recommencer">
            <img src="./Custom/Visuels/Button-Restart.png" alt="Recommencer" />
          </button>

          <button id="pauseButton" class="circle-btn pause" type="button" title="Pause" aria-label="Pause">
            <img src="./Custom/Visuels/Button-Pause.png" alt="Pause" />
          </button>
      </div>

      <div id="swipeArea" class="swipe-area" aria-hidden="false"></div>
    </div>
    <script src="game.js?v=20260706"></script>
  </body>
</html>
